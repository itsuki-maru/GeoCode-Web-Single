    <script>
        const layers = {{ layers | json_encode | safe }}
        const markersObj = {{ markersObj | json_encode | safe }}
        const shapesObj = {{ shapesObj | json_encode | safe }}
        const tileServers = {{ tileServers | json_encode | safe }};
        const isMaster = false;

        // markedの設定
        const videoToken = {
            name: "video",
            level: "inline",
            start(src) {
                return src.match(/\?\[.*\]\(.*\)/)?.index;
            },

            tokenizer(src, tokens) {
                const rule = /^\?\[(.*?)\]\((.*?)\)/;
                const match = rule.exec(src);
                if (match) {
                    return {
                        type: "video",
                        raw: match[0],
                        text: match[1],
                        href: match[2],
                        tokens: this.lexer.inlineTokens(match[1], [])
                    };
                }
            },
            renderer(token) {
                return `<video controls src="${token.href}" poster="${token.href}?thumb=true" preload="none">${token.text}</video>`;
            }
        }

        // カスタムトークン"youtube"の定義（型は緩くanyとする）
        const youtubeToken = {
            name: "youtube",
            level: "inline",
            start(src) {
                return src.match(/\?\[.*\]\(.*\)/)?.index;
            },
            tokenizer(src, tokens) {
                const rule = /^\@\[(youtube)\]\((.*?)\)/;
                const match = rule.exec(src);
                if (match) {
                    const id = extractYouTubeId(match[2]);
                    if (!id) return null;
                    return {
                        type: "youtube", // カスタムトークンタイプ
                        raw: match[0],
                        text: id,
                        href: match[2],
                    }
                }
                return null;
            },
            renderer(token) {
                // 生iframeではなく、自前テンプレートにする（例：Web Component）
                return `<app-youtube video-id="${token.text}" data-src="${token.href}"></app-youtube>`;
            }
        };

        // 11文字のYouTube ID検証
        const ID_RE = /^[\w-]{11}$/;
        function extractYouTubeId(rawUrl) {
            try {
                const url = new URL(rawUrl);
                const host = url.hostname.toLowerCase();
                const allowYouTubeList = [
                    "www.youtube.com",
                    "youtube.com",
                    "m.youtube.com",
                    "youtu.be",
                    "www.youtube-nocookie.com"
                ]
                if (!allowYouTubeList.includes(host)) return null;

                // shorts / watch / youtu.be に対応
                if (host === "youtu.be") {
                    const id = url.pathname.slice(1);
                    return ID_RE.test(id) ? id : null;
                };
                if (url.pathname.startsWith("/shorts/")) {
                    const id = url.pathname.split("/")[2] ?? "";
                    return ID_RE.test(id) ? id : null;
                };
                if (url.pathname === "/watch") {
                    const id = url.searchParams.get("v") ?? "";
                    return ID_RE.test(id) ? id : null;
                };
                if (url.pathname.startsWith("/embed/")) {
                    const id = url.pathname.split("/")[2] ?? "";
                    return ID_RE.test(id) ? id : null;
                };
                return null;
            } catch { return null; }
        }

        // app-youtubeからiframeに置換
        function renderIframe(html) {
            return html.replace(
                /<app-youtube\s+[^>]*video-id=["']([\w-]{11})["'][^>]*>(?:<\/app-youtube>)?/g,
                (_, videoId) => {
                    const src = `https://www.youtube-nocookie.com/embed/${videoId}`;
                    return `
                        <iframe
                            src="${src}"
                            title="YouTube video player"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen
                            width="100%" height="315"
                            style="border:0;"
                        ></iframe>
                    `.trim();
                }
            );
        };

        // ネスト対応トークナイザの共通関数
        function createNestedTokenizer(typeName) {
            const self = this.lexer;
            return {
                name: typeName,
                level: "block",
                start(src) {
                    const re = new RegExp(`^:::${typeName}\\s`, "m");
                    return src.match(re)?.index;
                },
                tokenizer(src, tokens) {
                    if (!src.startsWith(`:::${typeName}`)) return null;

                    const lines = src.split(/\r?\n/);
                    let nestLevel = 0;
                    let endIndex = -1;

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (/^:::(\w+)/.test(line)) {
                            nestLevel++;
                        } else if (/^:::\s*$/.test(line)) {
                            nestLevel--;
                            if (nestLevel === 0) {
                                endIndex = i;
                                break;
                            }
                        }
                    }

                    if (endIndex === -1) return null;

                    const rawLines = lines.slice(0, endIndex + 1);
                    const raw = rawLines.join("\n");

                    const titleMatch = lines[0].match(new RegExp(`^:::${typeName}\\s+(.+)`));
                    const title = titleMatch ? titleMatch[1].trim() : typeName.toUpperCase();

                    const content = lines.slice(1, endIndex).join("\n");

                    return {
                        type: typeName,
                        raw,
                        title,
                        tokens: this.lexer.blockTokens(content),
                    };
                },
                renderer(token) {
                    const body = marked.parser(token.tokens);
                    if (token.type === "details") {
                        return `<details class="details">\n<summary>${token.title}</summary>\n${body}\n</details>\n`;
                    } else {
                        return `<div class="box ${token.type}">\n<summary>${token.title}</summary>\n${body}\n</div>\n`;
                    }
                },
            };
        }

        // それぞれのトークンを生成
        const detailsToken = createNestedTokenizer("details");
        const noteToken = createNestedTokenizer("note");
        const warningToken = createNestedTokenizer("warning");

        marked.use({
            extensions: [
                videoToken,
                detailsToken,
                noteToken,
                warningToken,
                youtubeToken,
            ]
        });

        marked.use(
            {
                mangle: false,
                headerIds: false
            }
        );

        // 画像クリック時に別ウィンドウで拡大表示できるようにカスタムレンダラを定義
        const renderer = new marked.Renderer();
        const originalImageRenderer = renderer.image;
        renderer.image = function (href, title, text) {
            const separator = href.includes("?") ? "&" : "?";
            const newHref = href ? `${href}${separator}thumb=true` : "";
            const titleAttr = title ? ` title="${title}"` : "";
            const match = href.match(/\/static\/images\/([^\/]+)$/); // 画像ファイル名抜き出し
            if (match) {
                const filename = match[1];
                return `<img src="${newHref}" style="cursor:pointer;" onclick="callParentImagePreview('/images/html/${filename}')">`
            } else {
                // 例外処理相当として画像へのリンクをそのまま提供（プレビューなし）
                return `<img src="${href}">`
            }
        };

        // ローカルホスト判定
        function isLocalhost(url) {
            try {
                const parsedUrl = new URL(url);
                return parsedUrl.hostname === "localhost" || parsedUrl.hostname === "127.0.0.1" || parsedUrl.hostname === "[::1]";
            } catch (e) {
                return false;
            }
        }

        // 拡張子でPDFファイルか判定する関数
        function isPDF(filename) {
            return /\.pdf$/i.test(filename);
        }

        // [テキスト](URL)で定義された外部リンクを別タブで開かせるカスタムレンダラ設定
        // 元のlink関数を保存
        const originalLinkRenderer = renderer.link.bind(renderer);
        // link関数をオーバーライド
        renderer.link = (href, title, text) => {
            // 外部リンクかどうかをチェック
            const isExternal = /^https?:\/\//.test(href);
            let isLocal = false;
            let isPDFHref = false;
            if (href) {
                isLocal = isLocalhost(href);
                isPDFHref = isPDF(href);
            }
            const html = originalLinkRenderer(href, title, text);
            if (isExternal) {
                if (isLocal && isPDFHref) {
                    return html.replace(/^<a /, '<a target="_blank" rel="noopener noreferrer" title="PDFリンク" ');
                }
                return html.replace(/^<a /, '<a target="_blank" rel="noopener noreferrer" title="外部リンク" ');
            } else {
                // 内部リンクかつPDFの場合
                if (isPDFHref) {
                    return html.replace(/^<a /, '<a target="_blank" rel="noopener noreferrer" title="PDFリンク" ');
                }
                // 内部リンクの場合、元の処理を使用
                return originalLinkRenderer(href, title, text);
            }
        };

        marked.setOptions({ renderer });

        // detailsタグ内のimgタグとvideoタグ内のネットワークコンテンツを遅延読み込みさせる処理
        function setupDetailsLazyImages(root=document) {
            const detailsList = root.querySelectorAll(".details");

            detailsList.forEach(details => {
                if (details.hasAttribute("data-lazy-img-initialized")) return;

                details.setAttribute("data-lazy-img-initialized", "true");

                // 初期化処理: src -> data-srcへ退避
                const resources = details.querySelectorAll("img[src], video[src]");
                resources.forEach(element => {
                    const src = element.getAttribute("src");
                    if (src) {
                        element.setAttribute("data-src", src);
                        element.removeAttribute("src");
                    }
                });

                // toggleイベントで開かれたとき、自分の直下（= ネストしたdetails内は含めない）だけを処理
                details.addEventListener("toggle", () => {
                    if (!details.open) return;

                    // 自分の中のすべてのimg/videoを取得するが、閉じたこのdetailsの中にあるものは除外
                    const childDetails = details.querySelectorAll(".details");

                    // 画像と動画の処理を共通化
                    const loadVisibleMedia = (selector) => {
                        const elements = details.querySelectorAll(selector);
                        elements.forEach(el => {
                            // elが閉じた子detailsの中に含まれるならスキップ
                            for (const child of childDetails) {
                                if (!child.open && child.contains(el)) return;
                            }
                            if (!el.getAttribute("src") && el.getAttribute("data-src")) {
                                el.setAttribute("src", el.getAttribute("data-src"));
                            }
                        });
                    };

                    loadVisibleMedia("img[data-src]");
                    loadVisibleMedia("video[data-src]");
                });
            });
        }

        // XSSフィルタのカスタマイズ
        let xssOptions = {
            whiteList: {
                h1: ['id', 'class'], // h1タグのid属性を許可 class属性を許可
                h2: ['id', 'class'], // h2タグのid属性を許可 class属性を許可
                h3: ['id'], // h3タグのid属性を許可
                h4: ['id'], // h4タグのid属性を許可
                h5: ['id'], // h5タグのid属性を許可
                h6: ['id'], // h6タグのid属性を許可
                pre: ['class'],
                a: ['target', 'rel', 'href', 'title', 'onclick'],
                img: ['src', 'alt', 'onclick'],
                video: ['src', 'controls', 'preload', 'poster'],
                p: [],
                div: ['class'],
                span: [],
                li: [],
                strong: [],
                ul: [],
                ol: [],
                li: [],
                blockquote: [],
                code: [],
                table: [],
                tbody: [],
                th: [],
                td: [],
                tr: [],
                details: ['class'],
                summary: [],
                "app-youtube": ['video-id', 'data-src'],
            },
            // iframeの確認（念のため、iframeはここで不許可）
            onTag(tag, html) {
                if (tag === "iframe") return "Not Allow iframe ";
            },
            stripIgnoreTag: true,
            stripIgnoreTagBody: ["script"],
        };


        var map = L.map(
            "map",
            {
                center: [39.200, 138.500],
                crs: L.CRS.EPSG3857,
                zoom: 6,
                zoomControl: true,
                preferCanvas: false,
                // Leafletの著作権表示に_blank属性を追加するために、デフォルト値を無効化
                attributionControl: false
            }
        );

        // 日本の最南端と最北端の座標を使用して境界を設定
        const southWest = L.latLng(20.25, 122.56), // 最南端の座標
        northEast = L.latLng(45.55, 153.59); // 最北端の座標
        const bounds = L.latLngBounds(southWest, northEast);

        // 表示範囲の制限
        if (!tileServers["1"]["include_foreign_tiles"]) {
            map.setMaxBounds(bounds);
        }

        // leafletのライセンスリンクを別タブで開く設定を付与して追加
        L.control.attribution({prefix: false}).addAttribution('&copy; <a href="https://leafletjs.com" target="_blank" rel="noopener noreferrer">Leaflet</a>').addTo(map);

        // タイルレイヤーの制御
        var TileControl = L.Control.extend({
            options: {
                position: 'topright'
            },
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');

                // ラジオボタンのHTMLを動的に生成
                let radioHTML = '<div class="radio-zone"><form>';
                    for (const key in tileServers) {
                        let checkedAttribute = "";
                        if (key === "1") {
                            checkedAttribute = "checked"
                        }
                        radioHTML += `
                        <input class="tile-radio" type="radio" id="${tileServers[key]["layer_name"]}" name="tile" value="${key}" ${checkedAttribute}>
                        <label for="${tileServers[key]["layer_name"]}" class="tile-radio-label">${tileServers[key]["label"]}</label><br>
                        `
                    }
                    radioHTML += '</form></div>';
                    container.innerHTML = radioHTML;

                // タイルのイベントリスナーを追加
                const tileRadios = container.querySelectorAll(".tile-radio");
                tileRadios.forEach(radio => {
                    radio.addEventListener("change", handleTileChange);
                });

                // Leafletのクリックイベントとの干渉を避ける
                L.DomEvent.disableClickPropagation(container);
                return container;
            }
        });

        // 地図にタイルコントロールを追加
        map.addControl(new TileControl());

        // 初期タイルの設定
        var tileLayer = L.tileLayer(tileServers["1"]["url"], {
            minZoom: tileServers["1"]["min_zoom"] ?? 5,
            maxZoom: tileServers["1"]["max_zoom"] ?? 18,
            attribution: tileServers["1"]["attribution"]
        }).addTo(map);

        // タイルの切り替え関数
        function handleTileChange(event) {
            // 現在のレイヤーを削除
            map.removeLayer(tileLayer);

            // 選択されたタイル情報を取得
            const selectedTile = tileServers[event.target.value]

            // タイルサーバーのフラグに基づいてsetMaxBoundsを設定または解除
            if (selectedTile && selectedTile.include_foreign_tiles) {
                map.setMaxBounds(null); // 制限を解除
            } else {
                map.setMaxBounds(bounds); // 制限を設定
            }

            // 新しいタイルレイヤーを設定
            tileLayer = L.tileLayer(selectedTile.url, {
                minZoom: selectedTile.min_zoom ?? 5,
                maxZoom: selectedTile.max_zoom ?? 18,
                attribution: selectedTile.attribution
            }).addTo(map);
        }

        // ポップアップを開く関数
        function openMarkerPopup(markerId) {
            if (markers[`marker-${markerId}`]) {
                // 新しいdivIconの定義
                let newIcon = L.icon({
                    iconUrl: "/assets/marker.png", // 新しいアイコンの画像のパス
                    iconSize: [25, 41],    // アイコンのサイズ
                    iconAnchor: [12, 41],  // アイコンのアンカーポイント
                    popupAnchor: [1, -34], // ポップアップのアンカーポイント
                    shadowUrl: null
                });
                // アイコンの変更
                markers[`marker-${markerId}`].setIcon(newIcon);
                markers[`marker-${markerId}`].openPopup();
            }
        }

        // クラスターグループを管理するオブジェクト
        const clusterGroups = {};
        const shapeGroups = {};
        let isMeasurementVisible = false;
        // マーカーにIDを振るためのオブジェクト
        let markers = {};
        // レイヤー名を格納するオブジェクト
        let layerNames = {};
        const SHAPE_STYLE = {
            color: "#d94841",
            weight: 3,
            fillColor: "#d94841",
            fillOpacity: 0.16
        };

        // HTMLエスケープを行う関数
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        // 図形の名前を正規化する関数
        function normalizeShapeName(name) {
            if (typeof name !== "string") {
                return "";
            }
            return name.trim();
        }

        // 図形色を #RRGGBB 形式へ正規化する
        function normalizeShapeColor(color, fallback = SHAPE_STYLE.color) {
            if (typeof color !== "string") {
                return fallback;
            }

            const trimmedColor = color.trim();
            if (/^#[0-9a-fA-F]{6}$/.test(trimmedColor)) {
                return trimmedColor.toLowerCase();
            }

            if (/^#[0-9a-fA-F]{3}$/.test(trimmedColor)) {
                const expandedColor = trimmedColor
                    .slice(1)
                    .split("")
                    .map(value => value + value)
                    .join("");
                return `#${expandedColor}`.toLowerCase();
            }

            return fallback;
        }

        // 図形種別ごとの既定スタイルを返す
        function getDefaultShapeStyle(shapeType) {
            if (shapeType === "polyline") {
                return {
                    color: SHAPE_STYLE.color,
                    weight: SHAPE_STYLE.weight,
                    fill: false,
                };
            }

            return {
                color: SHAPE_STYLE.color,
                weight: SHAPE_STYLE.weight,
                fillColor: SHAPE_STYLE.color,
                fillOpacity: SHAPE_STYLE.fillOpacity,
            };
        }

        // GeoJSON から図形スタイルを取り出す
        function getShapeStyleFromGeoJson(shapeType, geojson) {
            const defaultStyle = getDefaultShapeStyle(shapeType);
            const styleRecord = geojson?.properties?.style;
            if (!styleRecord || typeof styleRecord !== "object") {
                return defaultStyle;
            }

            const nextColor = normalizeShapeColor(styleRecord.color, defaultStyle.color);
            const nextWeight = Number(styleRecord.weight);
            if (shapeType === "polyline") {
                return {
                    color: nextColor,
                    weight: Number.isFinite(nextWeight) ? nextWeight : defaultStyle.weight,
                    fill: false,
                };
            }

            const nextFillOpacity = Number(styleRecord.fillOpacity);
            return {
                color: nextColor,
                weight: Number.isFinite(nextWeight) ? nextWeight : defaultStyle.weight,
                fillColor: nextColor,
                fillOpacity: Number.isFinite(nextFillOpacity)
                    ? nextFillOpacity
                    : defaultStyle.fillOpacity,
            };
        }

        // GeoJSON に保存された円の半径を取り出す
        function getCircleRadiusFromGeoJson(geojson) {
            const radius = Number(geojson?.properties?.radius);
            return Number.isFinite(radius) && radius > 0 ? radius : null;
        }

        // レイヤ単位のマーカーグループを必要に応じて生成する
        function createMarkerGroupForLayer(layerId) {
            if (!layerId) {
                return null;
            }

            if (!clusterGroups[layerId]) {
                clusterGroups[layerId] = L.markerClusterGroup();
            }

            return clusterGroups[layerId];
        }

        // レイヤ単位の図形グループを必要に応じて生成する
        function ensureShapeGroup(layerId) {
            if (!layerId) {
                return null;
            }

            if (!shapeGroups[layerId]) {
                shapeGroups[layerId] = L.featureGroup();
            }

            return shapeGroups[layerId];
        }

        // マーカーグループから対応するレイヤ ID を逆引きする
        function findLayerIdByMarkerGroup(targetGroup) {
            for (const layerId in clusterGroups) {
                if (clusterGroups[layerId] === targetGroup) {
                    return layerId;
                }
            }

            return null;
        }

        // 指定レイヤのチェック状態に合わせて図形表示を同期する
        function syncShapeGroupVisibility(layerId) {
            if (!layerId || !shapeGroups[layerId]) {
                return;
            }

            if (map.hasLayer(clusterGroups[layerId])) {
                if (!map.hasLayer(shapeGroups[layerId])) {
                    shapeGroups[layerId].addTo(map);
                }

                shapeGroups[layerId].eachLayer(layer => {
                    if (layer?.isMeasurementLabel === true) {
                        setMeasurementMarkerVisibility(layer, isMeasurementVisible);
                    }
                    if (typeof layer.openTooltip === "function") {
                        layer.openTooltip();
                    }
                });
                return;
            }

            if (map.hasLayer(shapeGroups[layerId])) {
                map.removeLayer(shapeGroups[layerId]);
            }
        }

        // 全レイヤ分の図形表示を現在のチェック状態へ同期する
        function syncAllShapeGroupsVisibility() {
            Object.keys(shapeGroups).forEach(layerId => {
                syncShapeGroupVisibility(layerId);
            });
        }

        // 図形のラベル座標を取得する関数
        function flattenShapeLatLngs(latLngs) {
            if (!Array.isArray(latLngs) || latLngs.length === 0) {
                return [];
            }

            if (Array.isArray(latLngs[0])) {
                return flattenShapeLatLngs(latLngs[0]);
            }

            return latLngs;
        }

        // ポリラインの中心座標を取得する関数
        function getPolylineCenterLatLng(layer) {
            const latLngs = flattenShapeLatLngs(layer.getLatLngs());
            if (latLngs.length === 0) {
                return null;
            }

            if (latLngs.length === 1) {
                return latLngs[0];
            }

            let totalDistance = 0;
            for (let i = 1; i < latLngs.length; i += 1) {
                totalDistance += map.distance(latLngs[i - 1], latLngs[i]);
            }

            if (totalDistance === 0) {
                return latLngs[Math.floor(latLngs.length / 2)];
            }

            const targetDistance = totalDistance / 2;
            let accumulatedDistance = 0;

            for (let i = 1; i < latLngs.length; i += 1) {
                const start = latLngs[i - 1];
                const end = latLngs[i];
                const segmentDistance = map.distance(start, end);
                if (accumulatedDistance + segmentDistance >= targetDistance) {
                    const ratio = (targetDistance - accumulatedDistance) / segmentDistance;
                    return L.latLng(
                        start.lat + (end.lat - start.lat) * ratio,
                        start.lng + (end.lng - start.lng) * ratio
                    );
                }
                accumulatedDistance += segmentDistance;
            }

            return latLngs[Math.floor(latLngs.length / 2)];
        }

        // 図形のラベル座標を取得する関数
        function getShapeLabelLatLng(layer, shapeType) {
            if (shapeType === "polyline") {
                return getPolylineCenterLatLng(layer);
            }

            if (shapeType === "circle" && typeof layer.getLatLng === "function") {
                return layer.getLatLng();
            }

            if (typeof layer.getBounds === "function") {
                return layer.getBounds().getCenter();
            }

            return null;
        }

        // 距離をメートル/キロメートル表記へ整形する
        function formatDistance(distanceInMeters) {
            if (!Number.isFinite(distanceInMeters)) {
                return "-";
            }

            if (distanceInMeters >= 1000) {
                return `${(distanceInMeters / 1000).toFixed(2)} km`;
            }

            if (distanceInMeters >= 100) {
                return `${Math.round(distanceInMeters)} m`;
            }

            return `${distanceInMeters.toFixed(1)} m`;
        }

        // 面積を平方メートル/平方キロメートル表記へ整形する
        function formatArea(areaInSquareMeters) {
            if (!Number.isFinite(areaInSquareMeters)) {
                return "-";
            }

            if (areaInSquareMeters >= 1000000) {
                return `${(areaInSquareMeters / 1000000).toFixed(2)} km²`;
            }

            return `${Math.round(areaInSquareMeters)} m²`;
        }

        // 閉じたリングの終点重複を除去する
        function trimClosedLatLngs(latLngs) {
            if (!Array.isArray(latLngs) || latLngs.length < 2) {
                return Array.isArray(latLngs) ? [...latLngs] : [];
            }

            const normalizedLatLngs = [...latLngs];
            const first = normalizedLatLngs[0];
            const last = normalizedLatLngs[normalizedLatLngs.length - 1];
            if (first && last && first.lat === last.lat && first.lng === last.lng) {
                normalizedLatLngs.pop();
            }

            return normalizedLatLngs;
        }

        // ポリラインの各区間距離と総延長を計算する
        function measurePolyline(layer) {
            const latLngs = flattenShapeLatLngs(layer?.getLatLngs?.());
            const segments = [];
            let totalDistance = 0;

            for (let i = 1; i < latLngs.length; i += 1) {
                const distance = map.distance(latLngs[i - 1], latLngs[i]);
                segments.push({
                    label: `${i}`,
                    distance,
                });
                totalDistance += distance;
            }

            return {
                segments,
                totalDistance,
            };
        }

        // ポリゴン面積を EPSG:3857 の平面近似で求める
        function calculateProjectedPolygonArea(latLngs) {
            const vertices = trimClosedLatLngs(latLngs);
            if (vertices.length < 3) {
                return 0;
            }

            let sum = 0;
            for (let i = 0; i < vertices.length; i += 1) {
                const current = map.options.crs.project(vertices[i]);
                const next = map.options.crs.project(vertices[(i + 1) % vertices.length]);
                sum += (current.x * next.y) - (next.x * current.y);
            }

            return Math.abs(sum) / 2;
        }

        // ポリゴン/短形の各辺距離と面積を計算する
        function measurePolygon(layer) {
            const latLngs = trimClosedLatLngs(flattenShapeLatLngs(layer?.getLatLngs?.()));
            const edges = [];

            for (let i = 0; i < latLngs.length; i += 1) {
                const start = latLngs[i];
                const end = latLngs[(i + 1) % latLngs.length];
                edges.push({
                    label: `${i + 1}`,
                    distance: map.distance(start, end),
                });
            }

            return {
                edges,
                area: calculateProjectedPolygonArea(latLngs),
            };
        }

        // 円の半径と面積を計算する
        function measureCircle(layer) {
            const radius = Number(layer?.getRadius?.());
            return {
                radius,
                area: Number.isFinite(radius) ? Math.PI * radius * radius : 0,
            };
        }

        // 線分の中点を求める
        function getSegmentMidpoint(startLatLng, endLatLng) {
            return L.latLng(
                startLatLng.lat + ((endLatLng.lat - startLatLng.lat) / 2),
                startLatLng.lng + ((endLatLng.lng - startLatLng.lng) / 2)
            );
        }

        // 計測ラベルの HTML を組み立てる
        function buildMeasurementLabelHtml(lines, variant = "segment") {
            const classNameMap = {
                segment: "shape-measure-label",
                summary: "shape-measure-label shape-measure-label--summary",
                "summary-polyline": "shape-measure-label shape-measure-label--summary shape-measure-label--summary-polyline",
                "summary-circle": "shape-measure-label shape-measure-label--summary shape-measure-label--summary-circle",
                "summary-rectangle": "shape-measure-label shape-measure-label--summary shape-measure-label--summary-rectangle",
            };
            const className = classNameMap[variant] || classNameMap.segment;
            const lineHtml = lines
                .map(line => `<div class="shape-measure-label-line">${escapeHtml(line)}</div>`)
                .join("");
            return `<div class="${className}">${lineHtml}</div>`;
        }

        // 指定位置に計測ラベルマーカーを置く
        function createMeasurementLabelMarker(latLng, lines, variant = "segment") {
            if (!latLng || !Array.isArray(lines) || lines.length === 0) {
                return null;
            }

            const marker = L.marker(latLng, {
                interactive: false,
                keyboard: false,
                zIndexOffset: 900,
                icon: L.divIcon({
                    className: "shape-measure-marker",
                    html: buildMeasurementLabelHtml(lines, variant),
                }),
            });

            marker.isMeasurementLabel = true;
            return marker;
        }

        // 図形ごとの計測ラベル一覧を生成する
        function createShapeMeasurementMarkers(layer) {
            if (!layer) {
                return [];
            }

            const markers = [];

            if (layer.shapeType === "polyline") {
                const latLngs = flattenShapeLatLngs(layer.getLatLngs());
                const measurement = measurePolyline(layer);

                measurement.segments.forEach((segment, index) => {
                    const start = latLngs[index];
                    const end = latLngs[index + 1];
                    if (!start || !end) {
                        return;
                    }

                    markers.push(
                        createMeasurementLabelMarker(
                            getSegmentMidpoint(start, end),
                            [formatDistance(segment.distance)]
                        )
                    );
                });

                const summaryLatLng = getShapeLabelLatLng(layer, layer.shapeType);
                if (summaryLatLng) {
                    markers.push(
                        createMeasurementLabelMarker(
                            summaryLatLng,
                            [`総延長 ${formatDistance(measurement.totalDistance)}`],
                            "summary-polyline"
                        )
                    );
                }
            } else if (layer.shapeType === "polygon" || layer.shapeType === "rectangle") {
                const latLngs = trimClosedLatLngs(flattenShapeLatLngs(layer.getLatLngs()));
                const measurement = measurePolygon(layer);

                measurement.edges.forEach((edge, index) => {
                    const start = latLngs[index];
                    const end = latLngs[(index + 1) % latLngs.length];
                    if (!start || !end) {
                        return;
                    }

                    markers.push(
                        createMeasurementLabelMarker(
                            getSegmentMidpoint(start, end),
                            [formatDistance(edge.distance)]
                        )
                    );
                });

                const summaryLatLng = getShapeLabelLatLng(layer, layer.shapeType);
                if (summaryLatLng) {
                    const summaryVariant = layer.shapeType === "rectangle"
                        ? "summary-rectangle"
                        : "summary";
                    markers.push(
                        createMeasurementLabelMarker(
                            summaryLatLng,
                            [`面積 ${formatArea(measurement.area)}`],
                            summaryVariant
                        )
                    );
                }
            } else if (layer.shapeType === "circle") {
                const measurement = measureCircle(layer);
                const centerLatLng = getShapeLabelLatLng(layer, layer.shapeType);
                if (centerLatLng) {
                    markers.push(
                        createMeasurementLabelMarker(
                            centerLatLng,
                            [
                                `半径 ${formatDistance(measurement.radius)}`,
                                `面積 ${formatArea(measurement.area)}`
                            ],
                            "summary-circle"
                        )
                    );
                }
            }

            return markers.filter(Boolean);
        }

        // 計測ラベルを図形と同じレイヤグループへ登録する
        function attachShapeMeasurementMarkers(layer, layerId) {
            if (!layer) {
                return;
            }

            const markers = createShapeMeasurementMarkers(layer);
            if (markers.length === 0) {
                return;
            }

            layer.measurementMarkers = markers;
            const targetShapeGroup = ensureShapeGroup(layerId);
            if (targetShapeGroup) {
                markers.forEach(marker => {
                    targetShapeGroup.addLayer(marker);
                });
            }
        }

        // 計測ラベルマーカーの表示状態を反映する
        function setMeasurementMarkerVisibility(marker, visible) {
            if (!marker || marker.isMeasurementLabel !== true) {
                return;
            }

            if (typeof marker.setOpacity === "function") {
                marker.setOpacity(visible ? 1 : 0);
            }

            const markerElement = typeof marker.getElement === "function"
                ? marker.getElement()
                : null;
            if (markerElement) {
                markerElement.style.display = visible ? "" : "none";
            }
        }

        // 指定レイヤ内の計測ラベルへ現在の表示状態を反映する
        function applyMeasurementVisibilityToShapeGroup(layerId) {
            if (!layerId || !shapeGroups[layerId]) {
                return;
            }

            shapeGroups[layerId].eachLayer(layer => {
                if (layer?.isMeasurementLabel === true) {
                    setMeasurementMarkerVisibility(layer, isMeasurementVisible);
                }
            });
        }

        // すべての計測ラベルへ現在の表示状態を反映する
        function applyMeasurementVisibilityToAllShapeGroups() {
            Object.keys(shapeGroups).forEach(layerId => {
                applyMeasurementVisibilityToShapeGroup(layerId);
            });
        }

        // 図形の名前ラベルをバインドする関数
        function bindShapeNameLabel(layer, shapeType, shapeName) {
            const normalizedName = normalizeShapeName(shapeName);
            if (!normalizedName || typeof layer.bindTooltip !== "function") {
                return;
            }

            const labelLatLng = getShapeLabelLatLng(layer, shapeType);
            const labelColor = normalizeShapeColor(
                layer && layer.shapeStyle ? layer.shapeStyle.color : null,
                SHAPE_STYLE.color
            );
            layer.bindTooltip(
                `<div class="shape-name-label" style="color:${labelColor};">${escapeHtml(normalizedName)}</div>`,
                {
                    permanent: true,
                    direction: "center",
                    className: "shape-name-tooltip",
                }
            );

            const tooltip = typeof layer.getTooltip === "function" ? layer.getTooltip() : null;
            if (tooltip && labelLatLng && typeof tooltip.setLatLng === "function") {
                tooltip.setLatLng(labelLatLng);
            }
            if (typeof layer.openTooltip === "function") {
                layer.openTooltip();
            }
            const applyTooltipBorderColor = () => {
                const tooltipElement = tooltip && typeof tooltip.getElement === "function"
                    ? tooltip.getElement()
                    : null;
                if (!tooltipElement) {
                    return;
                }
                tooltipElement.style.setProperty("border-color", labelColor, "important");
                tooltipElement.style.setProperty("color", labelColor, "important");
            };
            applyTooltipBorderColor();
            setTimeout(applyTooltipBorderColor, 0);
        }

        // 形状タイプと GeoJSON から Leaflet レイヤを生成する
        function createLeafletShapeLayer(shapeType, geojson, shapeStyle) {
            if (shapeType === "circle") {
                const coordinates = geojson?.geometry?.coordinates;
                const radius = getCircleRadiusFromGeoJson(geojson);
                if (!Array.isArray(coordinates) || coordinates.length < 2 || !radius) {
                    return null;
                }
                return L.circle(
                    L.latLng(coordinates[1], coordinates[0]),
                    {
                        ...shapeStyle,
                        radius,
                    }
                );
            }

            const geoJsonLayer = L.geoJSON(geojson, {
                style: () => shapeStyle
            });
            const layers = geoJsonLayer.getLayers();
            return layers.length === 0 ? null : layers[0];
        }


        // レイヤー名を保存するオブジェクトを作成
        for (const key in layers) {
            if (!layerNames[layers[key]["id"]]) {
                layerNames[layers[key]["id"]] = layers[key]["layer_name"];
            }
        }

        // マーカーを作成
        // データごとにクラスターグループを作成
        for (const key in markersObj) {
            // layer_id ごとに markerClusterGroup を作成する
            createMarkerGroupForLayer(markersObj[key]["layer_id"]);

            // マーカーを作成してクラスターグループに追加する
            const marker = L.marker([markersObj[key]["latitude"], markersObj[key]["longitude"]]).bindPopup(markersObj[key]["marker_name"]);

            // ポップアップオープン時に遅延読み込みの処理を追加
            marker.on("popupopen", () => {
                setupDetailsLazyImages(document);
            });

            clusterGroups[markersObj[key]["layer_id"]].addLayer(marker);

            if (!markersObj[key]["marker_name"]) {
                marker.bindTooltip(`<div class="custom-tooltip">No Name</div>`, {permanent: false});
            } else {
                marker.bindTooltip(`<div class="custom-tooltip">${markersObj[key]["marker_name"]}</div>`, {permanent: false});
            }
            if (markersObj[key]["detail"]) {
                const mdText = `# ${markersObj[key]["marker_name"]}\n\n${markersObj[key]["detail"]}`;
                const mdToHtml = marked.parse(mdText);
                const cleanHtml = filterXSS(mdToHtml, xssOptions);
                const renderHtml = renderIframe(cleanHtml);
                const bindMDToHtml = `<div class="md-detail-contents">${renderHtml}</div>`;
                marker.bindPopup(bindMDToHtml);
            }
            // マーカーのHTML要素を取得し、id属性を設定
            let markerIcon = marker.getElement();
            if (markerIcon) {
                markerIcon.id = `marker-${markersObj["id"]}`;
            }
            markers[`marker-${markersObj["id"]}`] = marker;
        }

        for (const key in shapesObj) {
            createMarkerGroupForLayer(shapesObj[key]["layer_id"]);
        }

        // すべてのクラスターグループを地図に追加する
        Object.values(clusterGroups).forEach(group => group.addTo(map));

        // 共有図形の復元
        for (const key in shapesObj) {
            const layerId = shapesObj[key]["layer_id"];
            const shapeStyle = getShapeStyleFromGeoJson(
                shapesObj[key]["shape_type"],
                shapesObj[key]["geojson"]
            );
            const layer = createLeafletShapeLayer(
                shapesObj[key]["shape_type"],
                shapesObj[key]["geojson"],
                shapeStyle
            );
            if (!layer) {
                continue;
            }

            layer.shapeStyle = shapeStyle;
            layer.shapeType = shapesObj[key]["shape_type"];
            layer.shapeName = normalizeShapeName(shapesObj[key]["name"] || "");
            bindShapeNameLabel(layer, shapesObj[key]["shape_type"], shapesObj[key]["name"]);
            const targetShapeGroup = ensureShapeGroup(layerId);
            if (targetShapeGroup) {
                targetShapeGroup.addLayer(layer);
            }
            attachShapeMeasurementMarkers(layer, layerId);
        }

        // L.control.layers にクラスターグループを追加する
        const layersControl = L.control.layers(null, null, { collapsed: false });

        // クラスターグループの名前を設定して、レイヤーコントロールに追加する
        for (const layer_id in clusterGroups) {
            const layerName = layerNames[layer_id];
            if (!layerName) {
                continue;
            }
            layersControl.addOverlay(clusterGroups[layer_id], layerName);
        }

        // レイヤーコントロールをマップに追加
        layersControl.addTo(map);
        syncAllShapeGroupsVisibility();
        map.on("overlayadd", function (event) {
            const layerId = findLayerIdByMarkerGroup(event.layer);
            if (!layerId) {
                return;
            }

            setTimeout(() => {
                syncShapeGroupVisibility(layerId);
            }, 0);
        });
        map.on("overlayremove", function (event) {
            const layerId = findLayerIdByMarkerGroup(event.layer);
            if (!layerId) {
                return;
            }

            syncShapeGroupVisibility(layerId);
        });

        // ツールチップの制御
        const TooltipVisibleControl = L.Control.extend({
            options: {
                position: "topright"
            },
            onAdd: function(map) {
                const container = L.DomUtil.create("div", "leaflet-bar leaflet-control");

                // ラジオボタンのHTMLを動的に生成
                const button = L.DomUtil.create("button", "custom-control-button", container);
                button.innerHTML = "マーカー名表示";

                // ボタンのクリックイベント
                L.DomEvent.on(button, "click", function(e) {
                    L.DomEvent.stop(e);
                    // ここにカスタム機能を実装
                    toggleTooltips();
                });

                // Leafletのクリックイベントとの干渉を避ける
                L.DomEvent.disableClickPropagation(container);
                return container;
            }
        });

        // 地図にタイルコントロールを追加
        map.addControl(new TooltipVisibleControl());

        // 測定結果ラベル表示・非表示コントロールの定義
        const MeasurementVisibleControl = L.Control.extend({
            options: {
                position: "topright"
            },
            onAdd: function(map) {
                const container = L.DomUtil.create("div", "leaflet-bar leaflet-control");
                const button = L.DomUtil.create("button", "custom-control-button", container);
                button.innerHTML = "図形の計測";

                L.DomEvent.on(button, "click", function(e) {
                    L.DomEvent.stop(e);
                    toggleMeasurementLabels();
                });

                L.DomEvent.disableClickPropagation(container);
                return container;
            }
        });

        map.addControl(new MeasurementVisibleControl());


        // ツールチップの表示・非表示を管理する
        let isTooltipVisible = false;

        // ツールチップの表示非表示を切り替える関数
        function toggleTooltips () {
            if (isTooltipVisible) {
                map.eachLayer(function (layer) {
                    if (layer.getTooltip) {
                        var tooltip = layer.getTooltip();
                        if (tooltip) {
                            map.closeTooltip(tooltip);
                        }
                    }
                });
                isTooltipVisible = false;
            } else {
                map.eachLayer(function (layer) {
                    if (layer.getTooltip) {
                        layer.openTooltip();
                    }
                });
                isTooltipVisible = true;
            }
        }

        // 計測ラベルの表示非表示を切り替える関数
        function toggleMeasurementLabels() {
            isMeasurementVisible = !isMeasurementVisible;
            applyMeasurementVisibilityToAllShapeGroups();
        }


        // 座標検索
        var CodeSearchControl = L.Control.extend({
            options: {
                position: 'topleft'
            },

            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                // ラジオボタンのHTMLを作成
                container.innerHTML = `
                <div class="search-zone">
                    <input type="text" class="search-input" id="code-input" placeholder="緯度,経度" title="緯度経度を,区切りで入力してください。"><br>
                    <button id="code-search-btn" class="custom-search">座標検索</button>
                </div>`;

                const searchBtn = container.querySelector(".custom-search");
                // ボタンのクリックイベント
                L.DomEvent.on(searchBtn, "click", function(e) {
                    L.DomEvent.stop(e);
                    onSearchCode();
                });

                // Leafletのクリックイベントとの干渉を避ける
                L.DomEvent.disableClickPropagation(container);
                return container;
            }
        });

        function onSearchCode () {
            const latLng = document.getElementById("code-input").value;
            const cleandLatLng = latLng.replace(/[()\s]/g, "");
            const parts = cleandLatLng.split(",");
            if (parts.length === 2) {
                const lat = parts[0];
                const lng = parts[1];
                if (lat === "" || lng == "") {
                    console.log("Not value.");
                    return;
                }
                if (isValidCoordinate(lat, lng)) {
                    let latLng = new L.LatLng(lat, lng);
                    map.setView(latLng, 14);

                    // カスタムアイコン
                    let newIcon = L.icon({
                        iconUrl: "/assets/marker.png",
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowUrl: null
                    });

                    L.marker([lat, lng], { icon: newIcon }).addTo(map)
                        .bindPopup(`緯度：${lat}<br>経度：${lng}`)
                        .openPopup();
                    return;

                } else {
                    console.log("Not value.");
                    return;
                }
            } else {
                console.log("Value error.");
                return;
            }
        }

        function isValidCoordinate(lat, lng) {
            return !isNaN(lat) && lat >= -90 && lat <= 90 && !isNaN(lng) && lng >= -180 && lng <= 180;
        }

        // 地図にカスタムコントロールを追加
        map.addControl(new CodeSearchControl());

        // 現在地の追跡状態を保持
        let userLocationMarker = null;
        let userLocationAccuracyCircle = null;
        let userLocationWatchId = null;
        let latestUserLatLng = null;
        let shouldCenterOnNextUserLocationUpdate = false;
        let hasShownUserLocationError = false;
        let shouldNotifyUserLocationError = false;

        function createUserLocationMarker(latLng) {
            return L.circleMarker(latLng, {
                radius: 8,
                fillColor: "#1a73e8",
                fillOpacity: 1,
                color: "#ffffff",
                weight: 3,
            }).addTo(map);
        }

        function createUserLocationAccuracyCircle(latLng, accuracy) {
            return L.circle(latLng, {
                radius: accuracy,
                fillColor: "#1a73e8",
                fillOpacity: 0.15,
                color: "#1a73e8",
                weight: 1,
                opacity: 0.25,
                interactive: false,
            }).addTo(map);
        }

        function renderUserLocation(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            const latLng = new L.LatLng(latitude, longitude);
            const accuracy = position.coords.accuracy ?? 0;

            // 最新の現在地を保持して、ボタン押下時の再センタリングに使う
            latestUserLatLng = latLng;
            hasShownUserLocationError = false;
            shouldNotifyUserLocationError = false;

            // 常時表示用の現在地ドットは1つだけ生成し、以降は座標だけ更新する
            if (!userLocationMarker) {
                userLocationMarker = createUserLocationMarker(latLng);
            } else {
                userLocationMarker.setLatLng(latLng);
            }

            // Google マップ風に、精度範囲も淡い青円で追従させる
            if (!userLocationAccuracyCircle) {
                userLocationAccuracyCircle = createUserLocationAccuracyCircle(latLng, accuracy);
            } else {
                userLocationAccuracyCircle.setLatLng(latLng);
                userLocationAccuracyCircle.setRadius(accuracy);
            }

            if (shouldCenterOnNextUserLocationUpdate) {
                map.setView(latLng, Math.max(map.getZoom(), 16));
                shouldCenterOnNextUserLocationUpdate = false;
            }
        }

        function handleUserLocationError(error) {
            // 明示操作での失敗通知は1回に抑える
            if (shouldNotifyUserLocationError && hasShownUserLocationError) {
                return;
            }

            shouldCenterOnNextUserLocationUpdate = false;
            if (shouldNotifyUserLocationError) {
                hasShownUserLocationError = true;
                window.alert("位置情報の取得に失敗しました");
            }
            console.error("Get location error", error);
        }

        function startUserLocationWatch() {
            // 監視は重複開始しない
            if (!navigator.geolocation || userLocationWatchId !== null) {
                return;
            }

            userLocationWatchId = navigator.geolocation.watchPosition(
                renderUserLocation,
                handleUserLocationError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 5000,
                    timeout: 10000,
                }
            );
        }

        // 現在位置の取得ボタン
        const TooltipGetUserLocationControl = L.Control.extend({
            options: {
                position: "topleft"
            },
            onAdd: function(map) {
                const container = L.DomUtil.create("div", "leaflet-bar leaflet-control");

                // ラジオボタンのHTMLを動的に生成
                const button = L.DomUtil.create("button", "custom-control-button", container);
                button.innerHTML = "現在位置へ移動";

                // ボタンのクリックイベント
                L.DomEvent.on(button, "click", function(e) {
                    L.DomEvent.stop(e);
                    geoFindMe();
                });

                // Leafletのクリックイベントとの干渉を避ける
                L.DomEvent.disableClickPropagation(container);
                return container;
            }
        });

        // geolocation APIに対応したブラウザのみ地図にタイルコントロールを追加
        if ("geolocation" in navigator) {
            map.addControl(new TooltipGetUserLocationControl());
        }

        // 現在位置を取得して地図上に描画
        function geoFindMe() {
            if (!navigator.geolocation) {
                window.alert("このブラウザーは位置情報に対応していませ");
                console.info("Not supported browser");
            } else {
                shouldNotifyUserLocationError = true;
                shouldCenterOnNextUserLocationUpdate = true;

                // すでに現在地を取得済みなら、その座標へ即座に移動する
                if (latestUserLatLng) {
                    map.setView(latestUserLatLng, Math.max(map.getZoom(), 16));
                    shouldCenterOnNextUserLocationUpdate = false;
                    shouldNotifyUserLocationError = false;
                    return;
                }
                startUserLocationWatch();
            }
        }

        if ("geolocation" in navigator) {
            // ページ表示中は常に現在地を追跡する
            startUserLocationWatch();
            window.addEventListener("beforeunload", function () {
                // ページ離脱時に監視を解除して後始末する
                if (userLocationWatchId !== null) {
                    navigator.geolocation.clearWatch(userLocationWatchId);
                }
            });
        }
    </script>
</html>
