<!doctype html>
<html lang="ja">
    <head>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8" />

        <script>
            L_NO_TOUCH = false;
            L_DISABLE_3D = false;
        </script>

        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
        </style>
        <style>
            #map {
                position: absolute;
                top: 0;
                bottom: 0;
                right: 0;
                left: 0;
            }
        </style>
        <script src="/assets/marked.min.js"></script>
        <script src="/assets/leaflet.js"></script>
        <script src="/assets/jquery-1.12.4.min.js"></script>
        <script src="/assets/bootstrap.bundle.min.js"></script>
        <script src="/assets/leaflet.awesome-markers.js"></script>
        <script src="/assets/xss.min.js"></script>
        <link rel="stylesheet" href="/assets/leaflet.css" />
        <link rel="stylesheet" href="/assets/bootstrap.min.css" />
        <link rel="stylesheet" href="/assets/bootstrap3.0.0.min.css" />
        <link rel="stylesheet" href="/assets/all.min.css" />
        <link rel="stylesheet" href="/assets/leaflet.awesome-markers.css" />
        <link rel="stylesheet" href="/assets/leaflet.awesome.rotate.min.css" />
        <!-- Leaflet.markercluster -->
        <script src="/assets/leaflet.markercluster.js"></script>
        <link rel="stylesheet" href="/assets/MarkerCluster.css" />
        <link rel="stylesheet" href="/assets/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="/assets/github.css" />
        <link
            rel="manifest"
            href="https://geocode-web-mobile-app.pages.dev/assets/manifest.json"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no"
        />
        <style>
            #map_f7ef1184c39fa762ecccbe60c42f012d {
                position: relative;
                width: 100%;
                height: 100%;
                left: 0%;
                top: 0%;
            }

            .leaflet-container {
                font-size: 1rem;
            }
            .leaflet-popup {
                width: 400px;
            }
            /* マークダウンコンテンツ（detail）のスタイル */
            .md-detail-contents {
                width: 390px;
                max-width: 380px;
                max-height: 600px;
                overflow-y: auto;
                margin-top: 8%;
                padding-top: 3%;
                padding-right: 6%;
            }

            img,
            video {
                width: 350px;
                max-width: 100%;
                height: auto;
            }

            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                width: 350px;
            }

            p,
            li,
            ul,
            code,
            pre {
                width: auto;
                overflow-wrap: break-word;
            }

            .custom-tooltip {
                font-size: 14px;
                color: black;
                background-color: white;
            }

            .shape-name-tooltip {
                background: rgba(255, 255, 255, 0.92);
                border: 1px solid #d94841;
                border-radius: 999px;
                box-shadow: none;
                color: #7f1d1d;
                font-size: 12px;
                font-weight: bold;
                padding: 2px 8px;
            }

            .shape-name-tooltip::before {
                display: none;
            }

            .shape-measure-marker {
                background: transparent;
                border: none;
            }

            .shape-measure-label {
                background: rgba(255, 255, 255, 0.96);
                border: 1px solid #d0d7de;
                border-radius: 999px;
                box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
                color: #0f172a;
                display: inline-block;
                font-size: 11px;
                font-weight: 600;
                line-height: 1.2;
                padding: 2px 7px;
                pointer-events: none;
                transform: translate(-50%, -50%);
                white-space: nowrap;
            }

            .shape-measure-label--summary {
                border-radius: 10px;
                box-shadow: 0 3px 10px rgba(15, 23, 42, 0.14);
                font-size: 12px;
                padding: 5px 8px;
                transform: translate(-50%, 8px);
            }

            .shape-measure-label--summary-polyline {
                transform: translate(-50%, 26px);
            }

            .shape-measure-label--summary-circle {
                transform: translate(-50%, 36px);
            }

            .shape-measure-label--summary-rectangle {
                transform: translate(-50%, 24px);
            }

            .shape-measure-label-line + .shape-measure-label-line {
                margin-top: 2px;
            }

            /* ラジオボタンの全体 */
            .radio-zone {
                background-color: white; /* 背景色をWhiteにする */
                padding: 5px 5px 5px 5px;
            }
            /* ラジオボタンのスタイル変更 */
            .custom-radio {
                width: 20px; /* 幅を大きくする */
                height: 20px; /* 高さを大きくする */
                background-color: white; /* 背景色をWhiteにする */
            }
            /* ラジオボタンのラベルのスタイル変更 */
            .custom-radio-label {
                font-size: 14px; /* テキストサイズを大きくする */
                background-color: white; /* 背景色をWhiteにする */
                padding-left: 5px; /* パディングを追加して余白を作る */
                line-height: 20px; /* ラジオボタンの高さと同じにする */
                margin-top: 10px;
            }
            /* ラジオボタンがチェックされたときのスタイル変更 */
            .custom-radio:checked + .custom-radio-label {
                font-weight: bold; /* チェックされたときのテキストを太字にする */
            }
            /* ラジオボタンとラベルの中央揃え */
            .custom-radio,
            .custom-radio-label {
                vertical-align: middle;
            }

            /* ラジオボタンのスタイル変更 */
            .tile-radio {
                width: 20px; /* 幅を大きくする */
                height: 20px; /* 高さを大きくする */
                background-color: white; /* 背景色をWhiteにする */
            }
            /* ラジオボタンのラベルのスタイル変更 */
            .tile-radio-label {
                font-size: 14px; /* テキストサイズを大きくする */
                background-color: white; /* 背景色をWhiteにする */
                padding-left: 5px; /* パディングを追加して余白を作る */
                line-height: 20px; /* ラジオボタンの高さと同じにする */
                margin-top: 10px;
            }
            /* ラジオボタンがチェックされたときのスタイル変更 */
            .tile-radio:checked + .tile-radio-label {
                font-weight: bold; /* チェックされたときのテキストを太字にする */
            }
            /* ラジオボタンとラベルの中央揃え */
            .tile-radio,
            .tile-radio-label {
                vertical-align: middle;
            }

            /* モード説明部分のスタイル */
            .mode-desc-container {
                z-index: 1000;
                position: absolute;
                bottom: 10px;
                left: 10px;
                background-color: white;
                padding: 5px;
                border-radius: 5px;
            }

            /* ツールチップの表示・非表示切替ボタン*/
            .custom-control-button {
                background-color: white;
                border: none;
                cursor: pointer;
                padding: 5px 10px;
                font-size: 14px;
                font-weight: bold;
                border-radius: 4px;
            }

            .custom-control-button:hover {
                background-color: rgb(238, 238, 238);
            }

            .measurement-control {
                display: flex;
                flex-direction: column;
            }

            .measurement-control .custom-control-button {
                border-radius: 0;
                text-align: left;
            }

            .measurement-control .custom-control-button:first-child {
                border-radius: 4px 4px 0 0;
            }

            .measurement-control .custom-control-button:last-child {
                border-radius: 0 0 4px 4px;
                border-top: 1px solid #d0d7de;
            }

            .measurement-control .custom-control-button.is-active {
                background-color: #e7f5ff;
                color: #075985;
            }

            .measurement-control .custom-control-button.is-hidden {
                display: none;
            }

            .leaflet-control-layers-overlays {
                font-size: 14px;
            }

            .search-zone {
                background-color: white; /* 背景色をWhiteにする */
                padding: 5px 5px 5px 5px;
            }
            .custom-search {
                width: 100%;
            }
            .search-input {
                font-size: 14px;
                text-align: center;
                margin-bottom: 10px;
                border: 0.5px solid;
                border-radius: 5px;
            }
            #code-search-btn {
                border: 0.5px solid;
                font-size: 15px;
                border-radius: 5px;
            }
            .icon-red {
                filter: hue-rotate(150deg);
            }

            summary {
                list-style: none; /* デフォルトの矢印を非表示 */
                cursor: pointer;
                font-size: 18px;
            }

            summary::-webkit-details-marker {
                display: none; /* ChromeなどWebkit系ブラウザ対応 */
            }

            details > summary {
                position: relative;
                padding-left: 1.5em;
            }

            details > summary::before {
                content: "▶"; /* 未展開時のアイコン */
                position: absolute;
                left: 0;
                top: 0;
                transform: rotate(0deg);
                transition: transform 0.2s ease;
            }

            details[open] > summary::before {
                transform: rotate(90deg); /* 展開時に90度矢印を下に変更 */
            }

            .box.note {
                border-left: 4px solid #4caf50;
                background: #e8f5e9;
                padding: 0.5em;
                margin: 1em 0;
            }

            .box.warning {
                border-left: 4px solid #f44336;
                background: #ffebee;
                padding: 0.5em;
                margin: 1em 0;
            }
        </style>
        <title>GeoCode-Web</title>
    </head>
    <body>
        <div class="folium-map" id="map"></div>
    </body>
    <script>
        var layers = {{ layers | json_encode | safe }}
        var markersObj = {{ markersObj | json_encode | safe }}
        var shapesObj = {{ shapesObj | json_encode | safe }}
        var tileServers = {{ tileServers | json_encode | safe }};
        var isMaster = false;

    </script>
    <script src="/assets/map-common.js"></script>
    <script src="/assets/temporary-map-mobile.js"></script>
</html>
