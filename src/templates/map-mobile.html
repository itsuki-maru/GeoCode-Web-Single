        <style>
            #map_f7ef1184c39fa762ecccbe60c42f012d {
                position: relative;
                width: 100%;
                height: 100%;
                left: 0%;
                top: 0%;
            }

            .leaflet-container {
                font-size: 1rem;
            }
            .leaflet-popup {
                width: 400px;
            }
            /* マークダウンコンテンツ（detail）のスタイル */
            .md-detail-contents {
                width: 390px;
                max-width: 380px;
                max-height: 600px;
                overflow-y: auto;
                margin-top: 8%;
                padding-top: 3%;
                padding-right: 6%;
            }

            img,
            video {
                width: 350px;
                max-width: 100%;
                height: auto;
            }

            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                width: 350px;
            }

            p,
            li,
            ul,
            code,
            pre {
                width: auto;
                overflow-wrap: break-word;
            }

            .custom-tooltip {
                font-size: 14px;
                color: black;
                background-color: white;
            }

            /* ラジオボタンの全体 */
            .radio-zone {
                background-color: white; /* 背景色をWhiteにする */
                padding: 5px 5px 5px 5px;
            }
            /* ラジオボタンのスタイル変更 */
            .custom-radio {
                width: 20px; /* 幅を大きくする */
                height: 20px; /* 高さを大きくする */
                background-color: white; /* 背景色をWhiteにする */
            }
            /* ラジオボタンのラベルのスタイル変更 */
            .custom-radio-label {
                font-size: 14px; /* テキストサイズを大きくする */
                background-color: white; /* 背景色をWhiteにする */
                padding-left: 5px; /* パディングを追加して余白を作る */
                line-height: 20px; /* ラジオボタンの高さと同じにする */
                margin-top: 10px;
            }
            /* ラジオボタンがチェックされたときのスタイル変更 */
            .custom-radio:checked + .custom-radio-label {
                font-weight: bold; /* チェックされたときのテキストを太字にする */
            }
            /* ラジオボタンとラベルの中央揃え */
            .custom-radio,
            .custom-radio-label {
                vertical-align: middle;
            }

            /* ラジオボタンのスタイル変更 */
            .tile-radio {
                width: 20px; /* 幅を大きくする */
                height: 20px; /* 高さを大きくする */
                background-color: white; /* 背景色をWhiteにする */
            }
            /* ラジオボタンのラベルのスタイル変更 */
            .tile-radio-label {
                font-size: 14px; /* テキストサイズを大きくする */
                background-color: white; /* 背景色をWhiteにする */
                padding-left: 5px; /* パディングを追加して余白を作る */
                line-height: 20px; /* ラジオボタンの高さと同じにする */
                margin-top: 10px;
            }
            /* ラジオボタンがチェックされたときのスタイル変更 */
            .tile-radio:checked + .tile-radio-label {
                font-weight: bold; /* チェックされたときのテキストを太字にする */
            }
            /* ラジオボタンとラベルの中央揃え */
            .tile-radio,
            .tile-radio-label {
                vertical-align: middle;
            }

            /* モード説明部分のスタイル */
            .mode-desc-container {
                z-index: 1000;
                position: absolute;
                bottom: 10px;
                left: 10px;
                background-color: white;
                padding: 5px;
                border-radius: 5px;
            }

            /* ツールチップの表示・非表示切替ボタン*/
            .custom-control-button {
                background-color: white;
                border: none;
                cursor: pointer;
                padding: 5px 10px;
                font-size: 14px;
                font-weight: bold;
                border-radius: 4px;
            }

            .custom-control-button:hover {
                background-color: rgb(238, 238, 238);
            }

            .measurement-control {
                display: flex;
                flex-direction: column;
            }

            .measurement-control .custom-control-button {
                border-radius: 0;
                text-align: left;
            }

            .measurement-control .custom-control-button:first-child {
                border-radius: 4px 4px 0 0;
            }

            .measurement-control .custom-control-button:last-child {
                border-radius: 0 0 4px 4px;
                border-top: 1px solid #d0d7de;
            }

            .measurement-control .custom-control-button.is-active {
                background-color: #e7f5ff;
                color: #075985;
            }

            .measurement-control .custom-control-button.is-hidden {
                display: none;
            }

            .leaflet-control-layers-overlays {
                font-size: 14px;
            }

            .draw-control-wrapper {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .draw-control-zone.is-collapsed {
                display: none;
            }

            .draw-control-zone {
                background-color: white;
                padding: 6px;
                display: flex;
                flex-direction: column;
                gap: 6px;
                min-width: 150px;
                max-width: 180px;
            }

            .draw-control-input {
                border: 0.5px solid #b7c3d0;
                border-radius: 5px;
                font-size: 13px;
                padding: 5px 8px;
            }

            .draw-control-button {
                border: 0.5px solid;
                background-color: white;
                border-radius: 5px;
                font-size: 13px;
                padding: 4px 8px;
                cursor: pointer;
                text-align: left;
            }

            .draw-control-button:hover {
                background-color: rgb(238, 238, 238);
            }

            .draw-control-button.is-active {
                background-color: #e8f0fe;
                font-weight: bold;
            }

            .draw-status {
                z-index: 1000;
                position: absolute;
                right: 10px;
                bottom: 25px;
                max-width: calc(100vw - 20px);
                background-color: white;
                padding: 6px 10px;
                border-radius: 5px;
                font-size: 13px;
            }

            .draw-status.is-error {
                background-color: #ffebee;
                color: #b71c1c;
            }

            .draw-status.is-hidden {
                display: none;
            }

            .leaflet-overlay-pane .leaflet-interactive {
                cursor: default;
            }

            .leaflet-container.is-shape-drawing:not(.is-shape-delete),
            .leaflet-container.is-shape-drawing:not(.is-shape-delete) .leaflet-grab,
            .leaflet-container.is-shape-drawing:not(.is-shape-delete) .leaflet-interactive,
            .leaflet-container.is-shape-delete,
            .leaflet-container.is-shape-delete .leaflet-grab,
            .leaflet-container.is-shape-delete .leaflet-interactive {
                touch-action: none;
                user-select: none;
            }

            .leaflet-container.is-shape-delete,
            .leaflet-container.is-shape-delete .leaflet-grab,
            .leaflet-container.is-shape-delete .leaflet-interactive {
                cursor: pointer !important;
            }

            .shape-name-tooltip {
                background: rgba(255, 255, 255, 0.92);
                border: 1px solid #d94841;
                border-radius: 999px;
                box-shadow: none;
                color: #7f1d1d;
                cursor: pointer;
                font-size: 12px;
                font-weight: bold;
                pointer-events: auto;
                padding: 2px 8px;
            }

            .shape-name-tooltip::before {
                display: none;
            }

            .shape-name-label {
                display: inline-block;
                min-width: 1.5em;
                min-height: 1.2em;
            }

            }

            }

            .shape-name-editor-popup .leaflet-popup-content {
                margin: 0;
                width: auto !important;
                min-width: 0 !important;
            }

                gap: 8px;
                width: 190px;
                padding: 10px;
            }

            .shape-name-editor-title {
                font-size: 12px;

            }

            .shape-name-editor-input {
                border: 1px solid #b7c3d0;

            .shape-name-editor-color-row {

            .shape-name-editor-color-label {
                font-size: 12px;

            }

            .shape-name-editor-color-input {
                background: transparent;
                border: none;
                cursor: pointer;
                height: 20px;
                padding: 0;
                width: 48px;
            }

            .draw-control-color-row {
                align-items: center;
                display: flex;
                gap: 8px;
            }

            .draw-control-color-label {
                font-size: 12px;
                font-weight: bold;
            }

            .draw-control-color-input {
                background: transparent;
                border: none;
                cursor: pointer;
                height: 20px;
                padding: 0;
                width: 48px;
            }

            .shape-name-editor-help {
                color: #5f6b76;
                font-size: 11px;
                line-height: 1.4;
            }

            .shape-name-editor-actions {
                display: flex;
                gap: 6px;
                justify-content: flex-end;
            }

            .shape-name-editor-button {
                border: 0.5px solid #9aa7b6;
                background: white;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
                padding: 4px 10px;
            }

            .shape-name-editor-button:hover {
                background: #f4f6f8;
            }

            .shape-measure-marker {
                background: transparent;
                border: none;
            }

            .shape-measure-label {
                background: rgba(255, 255, 255, 0.96);
                border: 1px solid #d0d7de;
                border-radius: 999px;
                box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
                color: #0f172a;
                display: inline-block;
                font-size: 11px;
                font-weight: 600;
                line-height: 1.2;
                padding: 2px 7px;
                pointer-events: none;
                transform: translate(-50%, -50%);
                white-space: nowrap;
            }

            .shape-measure-label--summary {
                border-radius: 10px;
                box-shadow: 0 3px 10px rgba(15, 23, 42, 0.14);
                font-size: 12px;
                padding: 5px 8px;
                transform: translate(-50%, 8px);
            }

            .shape-measure-label--summary-polyline {
                transform: translate(-50%, 26px);
            }

            .shape-measure-label--summary-circle {
                transform: translate(-50%, 36px);
            }

            .shape-measure-label--summary-rectangle {
                transform: translate(-50%, 24px);
            }

            .shape-measure-label-line + .shape-measure-label-line {
                margin-top: 2px;
            }

            .search-zone {
                background-color: white; /* 背景色をWhiteにする */
                padding: 5px 5px 5px 5px;
            }
            .custom-search {
                width: 100%;
            }
            .search-input {
                font-size: 14px;
                text-align: center;
                margin-bottom: 10px;
                border: 0.5px solid;
                border-radius: 5px;
            }
            #code-search-btn {
                border: 0.5px solid;
                font-size: 15px;
                border-radius: 5px;
            }
            .icon-red {
                filter: hue-rotate(150deg);
            }

            summary {
                list-style: none; /* デフォルトの矢印を非表示 */
                cursor: pointer;
                font-size: 18px;
            }

            summary::-webkit-details-marker {
                display: none; /* ChromeなどWebkit系ブラウザ対応 */
            }

            details > summary {
                position: relative;
                padding-left: 1.5em;
            }

            details > summary::before {
                content: "▶"; /* 未展開時のアイコン */
                position: absolute;
                left: 0;
                top: 0;
                transform: rotate(0deg);
                transition: transform 0.2s ease;
            }

            details[open] > summary::before {
                transform: rotate(90deg); /* 展開時に90度矢印を下に変更 */
            }

            .box.note {
                border-left: 4px solid #4caf50;
                background: #e8f5e9;
                padding: 0.5em;
                margin: 1em 0;
            }

            .box.warning {
                border-left: 4px solid #f44336;
                background: #ffebee;
                padding: 0.5em;
                margin: 1em 0;
            }
