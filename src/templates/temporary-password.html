<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale={{ viewport_content }}, maximum-scale=1.0, user-scalable=no"
        />
        <title>GeoCode-Web</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                font-family:
                    "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
                background: whitesmoke;
                color: #1f2a38;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .card {
                width: min(450px, 100%);
                min-height: 360px;
                background: rgba(255, 255, 255, 0.96);
                border-radius: 18px;
                padding: 28px 24px;
                box-shadow: 0 16px 40px rgba(31, 42, 56, 0.14);
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            h1 {
                margin: 0 0 8px;
                font-size: 26px;
                text-align: center;
            }

            p {
                margin: 0 0 16px;
                line-height: 1.6;
                text-align: center;
            }

            .error {
                margin-bottom: 14px;
                padding: 10px 12px;
                border-radius: 10px;
                background: #fdeaea;
                color: #9d1c1c;
                text-align: center;
                font-size: 14px;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 12px;
                align-items: center;
            }

            input[type="text"] {
                width: 100%;
                max-width: 280px;
                box-sizing: border-box;
                padding: 12px 14px;
                border: 1px solid #c3d2e3;
                border-radius: 10px;
                font-size: 16px;
                background: #fff;
                text-align: center;
            }

            button {
                border: none;
                border-radius: 10px;
                padding: 12px 14px;
                min-width: 180px;
                font-size: 16px;
                color: #fff;
                background: #295f9e;
                cursor: pointer;
            }

            button:hover {
                background: #214e83;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>パスワード保護された共有マップ</h1>
            <p>
                この共有マップを表示するには、設定されたパスワードを入力してください。
            </p>
            {% if error_message != "" %}
            <div class="error">{{ error_message }}</div>
            {% endif %}
            <form method="post" autocomplete="off">
                <input
                    type="text"
                    name="password"
                    placeholder="共有パスワード"
                    spellcheck="false"
                    required
                />
                <button type="submit">表示する</button>
            </form>
        </div>
    </body>
</html>
